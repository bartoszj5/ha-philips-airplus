name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.0.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out repository
        uses: "actions/checkout@v4"
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vX.Y.Z, got: $tag" >&2
            exit 1
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Check out release tag
        if: "${{ github.event_name == 'workflow_dispatch' }}"
        shell: bash
        run: "git checkout -- '${{ steps.release-tag.outputs.tag }}'"

      - name: Check manifest version
        shell: bash
        run: |
          manifest_version="$(python3 -c 'import json; print(json.load(open("custom_components/philips_airplus_cloud/manifest.json"))["version"])')"
          release_version="${{ steps.release-tag.outputs.version }}"

          if [[ "$manifest_version" != "$release_version" ]]; then
            echo "manifest.json version ($manifest_version) does not match release tag ($release_version)" >&2
            exit 1
          fi

      - name: Build HACS release asset
        shell: bash
        run: |
          mkdir -p dist
          cd custom_components/philips_airplus_cloud
          zip -r ../../dist/philips_airplus_cloud.zip . \
            -x "*.pyc" \
            -x "__pycache__/*"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: "${{ github.token }}"
          RELEASE_TAG: "${{ steps.release-tag.outputs.tag }}"
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" \
            dist/philips_airplus_cloud.zip \
            --title "$RELEASE_TAG" \
            --generate-notes \
            --verify-tag
